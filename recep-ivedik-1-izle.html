<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recep İvedik 1 | FATBOK TV</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background: #050505; color: white; font-family: 'Plus Jakarta Sans', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .video-wrapper { width: 100%; max-width: 900px; background: #000; border-radius: 15px; overflow: hidden; box-shadow: 0 0 40px rgba(236, 93, 0, 0.3); border: 1px solid #333; }
        video { width: 100%; aspect-ratio: 16/9; outline: none; }
        .info { margin-top: 20px; text-align: center; }
        h1 { color: #ec5d00; margin-bottom: 5px; }
        p { opacity: 0.6; }
    </style>
</head>
<body>

    <div class="video-wrapper">
        <video id="video" controls autoplay playsinline crossorigin="anonymous"></video>
    </div>

    <div class="info">
        <h1>Recep İvedik 1</h1>
        <p>Eğer video hala açılmıyorsa link patlamış olabilir.</p>
    </div>

    <script>
        var video = document.getElementById('video');
        // Yeni bir link deniyoruz (Eski link patlamış olabilir)
        var videoSrc = 'https://vs16.photofunia.pro/v/Recep.Ivedik.2008.WEB-DL.1080p.H.264-iTunes/master.m3u8';

        if (Hls.isSupported()) {
            var hls = new Hls({
                debug: false,
                enableWorker: true,
                lowLatencyMode: true,
            });
            hls.loadSource(videoSrc);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, function() {
                video.play().catch(() => {
                    console.log("Otomatik oynatma engellendi, kullanıcı etkileşimi bekleniyor.");
                });
            });

            // Hata Yakalayıcı
            hls.on(Hls.Events.ERROR, function (event, data) {
                if (data.fatal) {
                    switch (data.type) {
                        case Hls.ErrorTypes.NETWORK_ERROR:
                            console.error("Ağ hatası: Linke ulaşılamıyor.");
                            hls.startLoad();
                            break;
                        case Hls.ErrorTypes.MEDIA_ERROR:
                            console.error("Medya hatası: Video çözülemiyor.");
                            hls.recoverMediaError();
                            break;
                        default:
                            hls.destroy();
                            break;
                    }
                }
            });
        }
        else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = videoSrc;
        }
    </script>
</body>
</html>
