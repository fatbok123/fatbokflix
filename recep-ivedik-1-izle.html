<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recep İvedik 1 | FATBOKFLIX</title>
    
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">

    <style>
        :root { 
            --plyr-color-main: #ec5d00; /* Senin turuncu rengin */
            --bg: #020202;
        }
        
        body { 
            background: var(--bg); 
            color: white; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 40px 20px;
        }

        .video-container { 
            width: 100%; 
            max-width: 1000px; 
            border-radius: 16px; 
            overflow: hidden; 
            box-shadow: 0 20px 80px rgba(0,0,0,0.8);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .movie-info {
            width: 100%;
            max-width: 960px;
            margin-top: 30px;
        }

        .movie-info h1 { 
            font-size: 2.5rem; 
            font-weight: 800; 
            margin: 0; 
            color: var(--plyr-color-main);
        }

        /* Plyr Özelleştirme */
        .plyr--full-ui input[type=range] { color: var(--plyr-color-main); }
        .plyr__control--overlaid { background: rgba(236, 93, 0, 0.8); }
        .plyr__video-embed iframe, .plyr__video-wrapper video { aspect-ratio: 16/9; }
    </style>
</head>
<body>

    <div class="video-container">
        <video id="player" playsinline controls crossorigin="anonymous" poster="https://image.kanald.com.tr/i/kanald/100/1200x0/5dafff2f2678991668dbc009.jpg">
            </video>
    </div>

    <div class="movie-info">
        <h1>Recep İvedik 1</h1>
        <p style="opacity: 0.6; line-height: 1.6;">Modern Player deneyimi ile FATBOKFLIX sunar. İyi seyirler dileriz.</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const video = document.querySelector('#player');
            const source = 'https://vs16.photofunia.pro/v/Recep.Ivedik.2008.WEB-DL.1080p.H.264-iTunes/master.m3u8';
            
            // Modern Player Ayarları
            const controls = [
                'play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 
                'captions', 'settings', 'pip', 'airplay', 'fullscreen'
            ];

            if (!Hls.isSupported()) {
                video.src = source;
                const player = new Plyr(video, { controls });
            } else {
                const hls = new Hls();
                hls.loadSource(source);
                hls.attachMedia(video);
                window.hls = hls;

                const player = new Plyr(video, { 
                    controls,
                    tooltips: { controls: true, seek: true },
                    speed: { selected: 1, options: [0.5, 0.75, 1, 1.25, 1.5, 2] }
                });
            }
        });
    </script>
</body>
</html>
