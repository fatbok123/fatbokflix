<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attack on Titan İzle | Tüm Bölümler | FATBOKFLIX</title>
    
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root {
            --bg: #020202;
            --surface: #0f0f12;
            --accent: #ec5d00;
            --text: #ffffff;
            --border: rgba(255, 255, 255, 0.08);
        }

        body { 
            background-color: var(--bg); color: var(--text); 
            font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; 
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        .player-section {
            width: 100%; max-width: 1100px; margin-top: 80px; padding: 0 20px;
        }
        .player-wrapper {
            border-radius: 20px; overflow: hidden; border: 1px solid var(--border);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); background: #000;
        }

        .playlist-section {
            width: 100%; max-width: 1100px; margin: 40px 0; padding: 0 20px;
        }
        .season-title {
            font-size: 1.4rem; font-weight: 800; margin-bottom: 20px;
            display: flex; align-items: center; gap: 10px; color: var(--accent);
        }
        .episodes-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
        }
        .ep-card {
            background: var(--surface); border: 1px solid var(--border);
            padding: 15px; border-radius: 12px; cursor: pointer;
            transition: 0.3s; display: flex; align-items: center; gap: 12px;
        }
        .ep-card:hover { border-color: var(--accent); background: rgba(236, 93, 0, 0.05); }
        .ep-card.active { border-color: var(--accent); background: var(--accent); color: white; }
        .ep-card.active .ep-num { color: white; opacity: 0.8; }
        
        .ep-num { font-weight: 800; font-size: 0.8rem; color: var(--accent); }
        .ep-name { font-size: 0.85rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .video-js { width: 100%; }
        .vjs-big-play-button { background-color: var(--accent) !important; border: none !important; border-radius: 50% !important; }
        
        /* Altyazı görünürlük ayarı */
        .video-js .vjs-text-track-display { font-size: 1.3em; pointer-events: none; }
        .vjs-text-track-cue { background-color: rgba(0, 0, 0, 0.6) !important; }

        .back-nav {
            position: absolute; top: 25px; left: 5%; color: white; text-decoration: none;
            font-weight: 600; display: flex; align-items: center; gap: 8px; opacity: 0.7; transition: 0.3s;
        }
        .back-nav:hover { opacity: 1; color: var(--accent); }
    </style>
</head>
<body>

    <a href="index.html" class="back-nav"><i data-lucide="chevron-left"></i> FATBOKFLIX</a>

    <div class="player-section">
        <div class="player-wrapper">
            <video id="main-player" class="video-js vjs-big-play-centered vjs-16-9" controls preload="auto" crossorigin="anonymous">
                <source id="video-source" src="https://vs22.photour.org/v/Attack.On.Titan.S01E01.1080p.BluRay/master.m3u8" type="application/x-mpegURL">
            </video>
        </div>
        
        <div style="margin-top: 25px;">
            <h1 id="current-title" style="font-size: 1.8rem; font-weight: 800;">Yükleniyor...</h1>
            <p id="current-desc" style="color: #94a3b8; margin-top: 10px;"></p>
        </div>
    </div>

    <div class="playlist-section">
        <div class="season-title"><i data-lucide="layers"></i> 1. Sezon</div>
        <div class="episodes-grid" id="epList"></div>
    </div>

    <script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
    <script>
        lucide.createIcons();

        // TÜM ALTYAZI METNİ (Gömülü)
        const altyaziMetni = `WEBVTT

00:00.560 --> 00:06.310
<b></b>

00:25.520 --> 00:29.680
<b>O gün insanoğlu hatırlamıştı...</b>

00:35.180 --> 00:38.260
<b>...devlerin boyunduruğu altında duydukları korku ve...</b>

00:40.610 --> 00:45.580
<b>...kafesteki kuşlar gibi yaşamanın verdiği aşağılanmayı.</b>

01:03.850 --> 01:05.880
<b>Herkes çatışmaya hazır olsun!</b>

01:06.170 --> 01:07.810
<b>Bir tane hedef var!</b>

01:07.810 --> 01:12.080
<b>Hedefi imha edip burayı surların dışındaki insanlığın ilk üssü yapacağız.</b>

01:13.200 --> 01:14.380
<b>Hedef yaklaşıyor!</b>

01:19.690 --> 01:21.720
<b>Beşe ayrılın ve talimlerinizi hatırlayın!</b>

01:22.670 --> 01:24.770
<b>Biz hedefin dikkatini dağıtacağız!</b>

01:24.960 --> 01:27.800
<b>Tüm taarruz timleri, yukarı çıkmaya hazırlanın!</b>

01:49.370 --> 01:51.670
<b>Biz yanlardan etrafını kuşatacağız!</b>

01:57.140 --> 02:01.010
<b>İnsanoğlunun kuvvetinin tadına bak bakalım!</b>

02:18.260 --> 02:23.460
Hiç kimse üstüne basılmış çiçeklerin ismini hatırlamaz

02:23.400 --> 02:28.800
Düşen kuşlar tekrar denemeden önce bir sonraki rüzgarı beklerler

02:28.700 --> 02:34.080
Dualar bizi kurtarmaz

02:34.000 --> 02:39.560
Bu dünyayı yalnızca savaşma arzusu değiştirebilir

02:39.260 --> 02:41.840
Sana gülen domuzları görmezden gelip...

02:41.560 --> 02:44.640
...ilerlemek için irade gücünü kullan

02:44.440 --> 02:47.360
Artık barış sarhoşu hayvanlar gibi yaşamak yok

02:47.100 --> 02:50.080
Bizler özgür aç kurtlarız!

02:49.920 --> 02:55.480
Esaretin aşağılanması intikamın çağrısı olacak

02:55.200 --> 03:00.700
Esir düşüp düşmemek fark etmez, avını öldüreceksin!

03:00.600 --> 03:06.140
İçine dolup taşan bu arzunun bedenini kavurduğu gibi...

03:05.860 --> 03:12.760
...çabucak bir yay al ve fırlat o yanan oku

03:35.000 --> 03:39.990
1. Bölüm - Shiganshina'nın Düşüşü`;

        const blob = new Blob([altyaziMetni], { type: 'text/vtt' });
        const vttURL = URL.createObjectURL(blob);

        const episodes = [
            {
                id: 1,
                title: "2000 Yıl Sonraki Sana",
                desc: "Shiganshina'nın Düşüşü, 1. Bölüm. İnsanlığın hatıralarındaki o karanlık gün.",
                m3u8: "https://vs22.photour.org/v/Attack.On.Titan.S01E01.1080p.BluRay/master.m3u8",
                vtt: vttURL
            },
            {
                id: 2,
                title: "O Gün",
                desc: "Shiganshina'nın Düşüşü, 2. Bölüm. Kaçış başlar.",
                m3u8: "", 
                vtt: "" 
            }
        ];

        const player = videojs('main-player');
        const epListContainer = document.getElementById('epList');

        function loadEpisode(index) {
            const ep = episodes[index];
            if(!ep.m3u8) return;

            document.getElementById('current-title').innerText = `Bölüm ${ep.id}: ${ep.title}`;
            document.getElementById('current-desc').innerText = ep.desc;
            
            player.src({ type: 'application/x-mpegURL', src: ep.m3u8 });
            
            player.ready(function() {
                // Mevcut altyazıları temizle
                const oldTracks = player.remoteTextTracks();
                for (let i = 0; i < oldTracks.length; i++) {
                    player.removeRemoteTextTrack(oldTracks[i]);
                }

                if(ep.vtt) {
                    const track = player.addRemoteTextTrack({
                        kind: 'subtitles',
                        src: ep.vtt,
                        srclang: 'tr',
                        label: 'Türkçe',
                        default: true
                    }, false);

                    // Altyazıyı zorla aktifleştir
                    track.on('load', function() {
                        this.mode = 'showing';
                    });
                }
            });

            document.querySelectorAll('.ep-card').forEach((card, i) => {
                card.classList.toggle('active', i === index);
            });
            
            player.play();
        }

        episodes.forEach((ep, index) => {
            const card = document.createElement('div');
            card.className = `ep-card ${index === 0 ? 'active' : ''}`;
            card.innerHTML = `
                <div class="ep-num">${ep.id < 10 ? '0'+ep.id : ep.id}</div>
                <div class="ep-name">${ep.title}</div>
            `;
            card.onclick = () => loadEpisode(index);
            epListContainer.appendChild(card);
        });

        loadEpisode(0);
    </script>
</body>
</html>
