    <style>
        :root {
            --bg: #020202;
            --surface: #0f0f12;
            --accent: #ec5d00;
            --text: #ffffff;
            --border: rgba(255, 255, 255, 0.08);
        }

        body { 
            background-color: var(--bg); color: var(--text); 
            font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; 
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        .player-section {
            width: 100%; max-width: 1100px; margin-top: 80px; padding: 0 20px;
        }
        .player-wrapper {
            border-radius: 20px; overflow: hidden; border: 1px solid var(--border);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); background: #000;
        }

        .playlist-section {
            width: 100%; max-width: 1100px; margin: 40px 0; padding: 0 20px;
        }
        .season-title {
            font-size: 1.4rem; font-weight: 800; margin-bottom: 20px;
            display: flex; align-items: center; gap: 10px; color: var(--accent);
        }
        .episodes-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
        }
        .ep-card {
            background: var(--surface); border: 1px solid var(--border);
            padding: 15px; border-radius: 12px; cursor: pointer;
            transition: 0.3s; display: flex; align-items: center; gap: 12px;
        }
        .ep-card:hover { border-color: var(--accent); background: rgba(236, 93, 0, 0.05); }
        .ep-card.active { border-color: var(--accent); background: var(--accent); color: white; }
        .ep-card.active .ep-num { color: white; opacity: 0.8; }
        
        .ep-num { font-weight: 800; font-size: 0.8rem; color: var(--accent); }
        .ep-name { font-size: 0.85rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .video-js { width: 100%; }
        .vjs-big-play-button { background-color: var(--accent) !important; border: none !important; border-radius: 50% !important; }
        
        /* Altyazı görünürlük ayarı */
        .video-js .vjs-text-track-display { font-size: 1.3em; pointer-events: none; }
        .vjs-text-track-cue { background-color: rgba(0, 0, 0, 0.7) !important; padding: 4px 8px !important; border-radius: 4px; }

        .back-nav {
            position: absolute; top: 25px; left: 5%; color: white; text-decoration: none;
            font-weight: 600; display: flex; align-items: center; gap: 8px; opacity: 0.7; transition: 0.3s;
        }
        .back-nav:hover { opacity: 1; color: var(--accent); }
    </style>

04:37.070 --> 04:38.100

04:52.720 --> 04:55.560
<b>Surlar Tanrı'nın eseridir!</b>

04:56.180 --> 05:00.030
<b>Hiç kimse surların kutsallığına dil uzatamaz!</b>

05:02.980 --> 05:07.390

05:16.700 --> 05:18.810

05:18.810 --> 05:20.960
<b>Ne diye ağlıyormuşsun bakayım Eren?</b>

05:22.880 --> 05:24.120

05:24.650 --> 05:26.760

05:30.190 --> 05:31.550
<b>Leş gibi içki kokuyorsun!</b>

05:32.700 --> 05:34.240
<b>Bunda kötü bir şey yok ki.</b>

05:35.650 --> 05:37.340
<b>Yine mi içiyorsunuz?</b>

05:39.210 --> 05:41.930
<b>Şey ama göreviniz yok mu?</b>

05:41.930 --> 05:43.980
<b>Evet, bugün kapıları gözetliyoruz.</b>

05:44.540 --> 05:49.880
<b>Sabahtan beri burada bekleyince doğal olarak acıktık ve susadık.</b>

05:49.880 --> 05:55.330
<b>Birazcık alkollü bir şeyler içmemiz o kadar da önemli bir şey değil.</b>

05:56.790 --> 05:59.170
<b>Bu halde gerektiğinde nasıl savaşacaksınız?</b>

05:59.630 --> 06:02.330
<b>Ne? Ne zaman savaşmamız gerekecek ki?</b>

06:03.850 --> 06:06.760
<b>Elbette o şeyler surları delip içeri girdikleri zaman!</b>

06:11.970 --> 06:15.540
<b>Eren, böyle şeyler yüksek sesle söylenmez.</b>

06:19.580 --> 06:23.890
<b>Surları yıkacak olurlarsa biz de üzerimize düşeni yaparız.</b>

06:25.250 --> 06:28.290
<b>...bu surlar 100 yıldan beridir hiç yıkılmadı.</b>

06:28.290 --> 06:33.830
<b>Ama babam en büyük tehlikenin insanların böyle rehavete kapılması olduğunu söylemişti!</b>

06:37.600 --> 06:41.670
<b>Doktor daha önce şehrimizi vebadan kurtarmıştı.</b>

06:44.880 --> 06:47.920
<b>Yine de devler tamamen farklı bir konu.</b>

06:55.830 --> 07:00.960
<b>Asker olarak konuşursam 50 metrelik surlara bir şey yapabileceklerini sanmıyorum.</b>

07:00.960 --> 07:06.030
<b>O zaman en başından beri onlarla savaşmak için hazırlıklı değil misiniz?</b>

07:06.030 --> 07:07.120
<b>Sanırım değiliz.</b>

07:11.950 --> 07:14.080
<b>Öyleyse adınızı Sur Tamircileri olarak değiştirin.</b>

07:17.200 --> 07:22.710
<b>Yine de Eren, askerlerin savaşma vakti geldiğinde felaket kapıya dayanmış demektir.</b>

07:23.130 --> 07:27.750
<b>"İşe yaramaz beleşçiler" olarak anıldığımızda insanlar daha mutludur demektir.</b>

07:32.810 --> 07:39.640
<b>Yemek yiyip uyduğumuz müddetçe yaşayacağız. Ama böyle yaşayarak...</b>

07:43.960 --> 07:46.190
<b>...çiftlik hayvanlarından ne farkımız kalır ki?</b>

08:34.880 --> 08:37.240
<b>Keşif Birliği geri döndü!</b>

08:39.160 --> 08:41.700
<b>Gidelim Mikasa! Kahramanlar geri döndü!</b>

09:25.310 --> 09:28.370
<b>Geriye bu kadar azının geleceğini kim düşünebilirdi.</b>

09:37.650 --> 09:41.420
<b>Oğlum Moses'i göremiyorum. Oğlum nerede?</b>

10:14.130 --> 10:17.370
<b>Oğlunuzun kurtarabildiğimiz tek parçası bu.</b>

10:33.900 --> 10:37.900
<b>Ama oğlum bir işe yaradı, değil mi?</b>

11:02.340 --> 11:05.880
<b>Bu görev sırasında biz... hâlâ herhangi bir ilerleme kaydedemedik!</b>

11:21.050 --> 11:27.300
<b>Devlerin kökeni ya da amaçlarına dair faydalı hiçbir şey öğrenemedik!</b>

11:44.740 --> 11:46.300
<b>Ne yaptığını sanıyorsun lanet velet?</b>

11:51.690 --> 11:53.980
<b>Ne yapıyorsun Mikasa?</b>

12:03.850 --> 12:05.270
<b>Bunu niye yaptın şimdi?</b>

12:28.990 --> 12:34.000

12:34.000 --> 12:39.000
<b>An İtibarı İle İfşa Edilebilir Bilgiler</b>
Maria ve Rose arası 100 km, Rose ve Sina arası 130 km.

13:12.830 --> 13:15.540
<b>İç surlarda birini görmem gerekiyor. İki üç güne dönerim.</b>

13:20.600 --> 13:23.550
<b>Eren Keşif Birliğine katılmak istiyor.</b>

13:39.010 --> 13:40.020
<b>Biliyorum tabii!</b>

13:51.230 --> 13:54.900

14:25.800 --> 14:30.780
<b>Döndüğüm zaman sana hep kapalı tuttuğum bodrum katını göstereceğim.</b>

14:47.620 --> 14:52.930

15:47.730 --> 15:49.950
<b>Eyvah. Kaçın lan! Mikasa da yanında!</b>

16:11.050 --> 16:12.150
<b>Kendim ayağa kalkabilirim.</b>

16:29.560 --> 16:35.140
<b>Bunun nedeni 100 yıldır huzurlu bir yaşam sürüyor olmamız.</b>

17:19.410 --> 17:32.510
<b>100 yıldır yıkılmamış olsalar da bir gün yıkılmayacaklarının garantisi yok.</b>

18:33.830 --> 18:35.150
<b>Bu bir dev!</b>

19:32.230 --> 19:34.920
<b>Devler içeri girdiler!</b>

20:21.000 --> 20:22.150
<b>Anne!</b>

20:53.550 --> 20:57.330
<b>Eren, Mikasa'yı da alıp kaç! Çabuk ol!</b>

21:31.250 --> 21:33.500
<b>Çocukları alıp kaç buradan!</b>

22:21.190 --> 22:22.570
<b>Yaşamalısınız!</b>

23:39.020 --> 23:43.810
<b>O gün insanoğlu acı bir şekilde hatırlamıştı...</b>

25:34.710 --> 25:39.400
<b>Ancak Eren, o minicik kalbiyle intikam almaya yemin etti.`;

        const blob = new Blob([altyaziMetni], { type: 'text/vtt' });
        const vttURL = URL.createObjectURL(blob);

        const episodes = [
            {
                id: 1,
                title: "2000 Yıl Sonraki Sana",
                desc: "Shiganshina'nın Düşüşü, 1. Bölüm. İnsanlığın hatıralarındaki o karanlık gün.",
                m3u8: "https://vs22.photour.org/v/Attack.On.Titan.S01E01.1080p.BluRay/master.m3u8",
                vtt: vttURL
            },
            {
                id: 2,
                title: "O Gün",
                desc: "Shiganshina'nın Düşüşü, 2. Bölüm. Kaçış başlar.",
                m3u8: "", 
                vtt: "" 
            }
        ];

        const player = videojs('main-player');
        const epListContainer = document.getElementById('epList');

        function loadEpisode(index) {
            const ep = episodes[index];
            if(!ep.m3u8) return;

            document.getElementById('current-title').innerText = `Bölüm ${ep.id}: ${ep.title}`;
            document.getElementById('current-desc').innerText = ep.desc;
            
            player.src({ type: 'application/x-mpegURL', src: ep.m3u8 });
            
            player.ready(function() {
                const oldTracks = player.remoteTextTracks();
                for (let i = 0; i < oldTracks.length; i++) {
                    player.removeRemoteTextTrack(oldTracks[i]);
                }

                if(ep.vtt) {
                    const track = player.addRemoteTextTrack({
                        kind: 'subtitles',
                        src: ep.vtt,
                        srclang: 'tr',
                        label: 'Türkçe',
                        default: true
                    }, false);

                    track.on('load', function() {
                        this.mode = 'showing';
                    });
                }
            });

            document.querySelectorAll('.ep-card').forEach((card, i) => {
                card.classList.toggle('active', i === index);
            });
            
            player.play();
        }

        episodes.forEach((ep, index) => {
            const card = document.createElement('div');
            card.className = `ep-card ${index === 0 ? 'active' : ''}`;
            card.innerHTML = `
                <div class="ep-num">${ep.id < 10 ? '0'+ep.id : ep.id}</div>
                <div class="ep-name">${ep.title}</div>
            `;
            card.onclick = () => loadEpisode(index);
            epListContainer.appendChild(card);
        });

        loadEpisode(0);
    </script>
</body>
