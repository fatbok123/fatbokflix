        const altyaziMetni = `WEBVTT

00:00.560 --> 00:06.310
<b></b>

00:25.520 --> 00:29.680
<b>O gün insanoğlu hatırlamıştı...</b>

00:35.180 --> 00:38.260
<b>...devlerin boyunduruğu altında duydukları korku ve...</b>

00:40.610 --> 00:45.580
<b>...kafesteki kuşlar gibi yaşamanın verdiği aşağılanmayı.</b>

01:03.850 --> 01:05.880
<b>Herkes çatışmaya hazır olsun!</b>

01:06.170 --> 01:07.810
<b>Bir tane hedef var!</b>

01:07.810 --> 01:12.080
<b>Hedefi imha edip burayı surların dışındaki insanlığın ilk üssü yapacağız.</b>

01:13.200 --> 01:14.380
<b>Hedef yaklaşıyor!</b>

01:19.690 --> 01:21.720
<b>Beşe ayrılın ve talimlerinizi hatırlayın!</b>

01:22.670 --> 01:24.770
<b>Biz hedefin dikkatini dağıtacağız!</b>

01:24.960 --> 01:27.800
<b>Tüm taarruz timleri, yukarı çıkmaya hazırlanın!</b>

01:49.370 --> 01:51.670
<b>Biz yanlardan etrafını kuşatacağız!</b>

01:57.140 --> 02:01.010
<b>İnsanoğlunun kuvvetinin tadına bak bakalım!</b>

02:18.260 --> 02:23.460
<b>Fumareta Hana no Namae mo Shirazuni</b>
Hiç kimse üstüne basılmış çiçeklerin ismini hatırlamaz

02:23.400 --> 02:28.800
<b>Chiriochita Tori wa Kaze wo Machiwabiru</b>
Düşen kuşlar tekrar denemeden önce bir sonraki rüzgarı beklerler

02:28.700 --> 02:34.080
<b>Inotta Tokoro de Nani mo Kawaranai</b>
Dualar bizi kurtarmaz

02:34.000 --> 02:39.560
<b>Ima wo Kaeruno wa Tatakau Kakugo da</b>
Bu dünyayı yalnızca savaşma arzusu değiştirebilir

02:39.260 --> 02:41.840
<b>Chikara de Fumikoe Te</b>
Sana gülen domuzları görmezden gelip...

02:41.560 --> 02:44.640
<b>Susumu Ishi wo Warau Butayo</b>
...ilerlemek için irade gücünü kullan

02:44.440 --> 02:47.360
<b>Kachiku no Annei Kyoi no Han'ei</b>
Artık barış sarhoşu hayvanlar gibi yaşamak yok

02:47.100 --> 02:50.080
<b>Shiseru Garou no Jiyuu wo</b>
Bizler özgür aç kurtlarız!

02:49.920 --> 02:55.480
<b>Torawareta Kutsujoku wa Hangeki no Kobushi da</b>
Esaretin aşağılanması intikamın çağrısı olacak

02:55.200 --> 03:00.700
<b>Choueki no Sono Karada Emono wo Houmurieyo</b>
Esir düşüp düşmemek fark etmez, avını öldüreceksin!

03:00.600 --> 03:06.140
<b>Hotobashiru Shoudou ni Sono Mi wo Yakinagara</b>
İçine dolup taşan bu arzunun bedenini kavurduğu gibi...

03:05.860 --> 03:12.760
<b>Kasoku Te ni Hi wo Fukasu Guren no Yumiya</b>
...çabucak bir yay al ve fırlat o yanan oku

03:35.000 --> 03:39.990
1. Bölüm - Günümüzden 2000 Yıl Sonra

04:06.850 --> 04:08.880
<b>Sen misin Mikasa?</b>

04:09.920 --> 04:11.350
<b>Artık eve dönelim.</b>

04:12.720 --> 04:14.780
<b>Burada ne işin var?</b>

04:15.990 --> 04:18.570
<b>Hâlâ rüya gördüğünü sanacak kadar derin mi uyuyordun?</b>

04:19.160 --> 04:24.540
<b>Hayır, bir türlü bitmek bilmeyen bir rüya gördüğümü düşünüyordum.</b>

04:26.600 --> 04:30.350
<b>Nasıl bir rüyaydı ki? Hatırlayamıyorum.</b>

04:34.460 --> 04:36.670
<b>Eren, niye ağlıyorsun?</b>

04:37.070 --> 04:38.100
<b>Ne?</b>

04:42.070 --> 04:44.630
845 Yılı - Shiganshina Bölgesi

04:47.970 --> 04:52.350
<b>Dinleyin! Surlar Tanrı'nın bahşettiği irfanla inşa edilmiştir.</b>

04:52.720 --> 04:55.560
<b>Surlar Tanrı'nın eseridir!</b>

04:56.180 --> 05:00.030
<b>Hiç kimse surların kutsallığına dil uzatamaz!</b>

05:02.980 --> 05:07.390
<b>Ağladığımı hiç kimseye söyleme!</b>

05:07.390 --> 05:08.100
<b>Söylemem.</b>

05:09.270 --> 05:15.080
<b>Ama neden ağladığını bilmiyorsan bunu babanla konuşman iyi olmaz mı?</b>

05:15.080 --> 05:16.700
<b>Aptallaşma!</b>

05:16.700 --> 05:18.810
<b>Babama bunu nasıl söyleyebilirim.</b>

05:18.810 --> 05:20.960
<b>Ne diye ağlıyormuşsun bakayım Eren?</b>

05:22.880 --> 05:24.120
<b>Hannes.</b>

05:24.650 --> 05:26.760
<b>Mikasa mı kızdı yoksa?</b>

05:27.120 --> 05:27.960
<b>Ne?</b>

05:27.960 --> 05:30.190
<b>Ne diye ben ağlayacakmışım ki?</b>

05:30.190 --> 05:31.550
<b>Leş gibi içki kokuyorsun!</b>

05:32.700 --> 05:34.240
<b>Bunda kötü bir şey yok ki.</b>

05:35.650 --> 05:37.340
<b>Yine mi içiyorsunuz?</b>

05:37.340 --> 05:39.210
<b>Sen de bize katılmak ister misin?</b>

05:39.210 --> 05:41.930
<b>Şey ama göreviniz yok mu?</b>

05:41.930 --> 05:43.980
<b>Evet, bugün kapıları gözetliyoruz.</b>

05:44.540 --> 05:49.880
<b>Sabahtan beri burada bekleyince doğal olarak acıktık ve susadık.</b>

05:49.880 --> 05:55.330
<b>Birazcık alkollü bir şeyler içmemiz o kadar da önemli bir şey değil.</b>

05:56.790 --> 05:59.170
<b>Bu halde gerektiğinde nasıl savaşacaksınız?</b>

05:59.630 --> 06:02.330
<b>Ne? Ne zaman savaşmamız gerekecek ki?</b>

06:02.330 --> 06:03.300
<b>Bir de soruyor musun?</b>

06:03.850 --> 06:06.760
<b>Elbette o şeyler surları delip içeri girdikleri zaman!</b>

06:10.300 --> 06:11.970
<b>Bak bu can yakıcıydı.</b>

06:11.970 --> 06:15.540
<b>Eren, böyle şeyler yüksek sesle söylenmez.</b>

06:16.600 --> 06:19.020
<b>Epey de tez canlı değil mi doktorun ufaklığı?</b>

06:19.580 --> 06:23.890
<b>Surları yıkacak olurlarsa biz de üzerimize düşeni yaparız.</b>

06:23.890 --> 06:25.040
<b>Yine de...</b>

06:25.250 --> 06:28.290
<b>...bu surlar 100 yıldan beridir hiç yıkılmadı.</b>

06:28.290 --> 06:33.830
<b>Ama babam en büyük tehlikenin insanların böyle rehavete kapılması olduğunu söylemişti!</b>

06:33.830 --> 06:35.920
<b>Doktor öyle mi dedi?</b>

06:35.920 --> 06:37.320
<b>Gerçi haksız da değil.</b>

06:37.600 --> 06:41.670
<b>Doktor daha önce şehrimizi vebadan kurtarmıştı.</b>

06:42.360 --> 06:44.880
<b>Ne yapsak ona borcumuzu ödeyemeyiz.</b>

06:44.880 --> 06:47.920
<b>Yine de devler tamamen farklı bir konu.</b>

06:49.220 --> 06:55.350
<b>Surları tamir ederken hep etrafta dolaşan devleri görüyorum.</b>

06:55.830 --> 07:00.960
<b>Ama bir asker olarak konuşursam 50 metrelik surlara bir şey yapabileceklerini sanmıyorum.</b>

07:00.960 --> 07:06.030
<b>O zaman en başından beri onlarla savaşmak için hazırlıklı değil misiniz?</b>

07:06.030 --> 07:07.120
<b>Sanırım değiliz.</b>

07:08.130 --> 07:09.550
<b>Bu da ne demek?</b>

07:09.550 --> 07:11.950
<b>Öyleyse kendinize Şehir Muhafızları demeyi bırakıp...</b>

07:11.950 --> 07:14.080
<b>...adınızı Sur Tamircileri olarak değiştirin.</b>

07:14.080 --> 07:15.700
<b>Bak bu kulağa fena gelmiyor.</b>

07:17.200 --> 07:22.710
<b>Yine de Eren, askerlerin savaşma vakti geldiğinde felaket kapıya dayanmış demektir.</b>

07:23.130 --> 07:27.750
<b>Hiçbir şey yapmadan "işe yaramaz beleşçiler" olarak anıldığımızda...</b>

07:27.750 --> 07:29.880
<b>...insanlar daha mutludur demektir.</b>

07:32.810 --> 07:39.640
<b>Evet, biliyorum. Dışarı çıkamasak da yemek yiyip uyduğumuz müddetçe yaşayacağız.</b>

07:40.030 --> 07:42.490
<b>Ama böyle yaşayarak...</b>

07:43.960 --> 07:46.190
<b>...çiftlik hayvanlarından ne farkımız kalır ki?</b>

07:49.330 --> 07:51.740
<b>Veledin ağzı iyi laf yapıyor.</b>

07:51.740 --> 07:55.040
<b>Sanki kendi elinden bir şey gelirmiş gibi, değil mi Hannes?</b>

07:55.900 --> 07:57.040
<b>Evet.</b>

08:01.860 --> 08:03.540
<b>Ne tuhaf çocuk ama!</b>

08:04.410 --> 08:08.620
<b>Yoksa Keşif Birliğine katılmayı mı istiyor?</b>

08:17.800 --> 08:20.810
<b>Eren, Keşif Birliğine katılmaktan vazgeçmen en iyisi.</b>

08:21.910 --> 08:25.500
<b>Ne? Sen de mi onlarla dalga geçmeye başlayacaksın?</b>

08:34.880 --> 08:37.240
<b>Keşif Birliği geri döndü!</b>

08:39.160 --> 08:41.700
<b>Gidelim Mikasa! Kahramanlar geri döndü!</b>

09:25.310 --> 09:28.370
<b>Geriye bu kadar azının geleceğini kim düşünebilirdi.</b>

09:30.970 --> 09:34.480
<b>Surların dışına çıkarsan başına gelecek olan budur işte.</b>

09:37.650 --> 09:41.420
<b>Şey, oğlum Moses'i göremiyorum. Oğlum nerede?</b>

10:14.130 --> 10:17.370
<b>Oğlunuzun kurtarabildiğimiz tek parçası bu.</b>

10:33.900 --> 10:37.900
<b>Ama oğlum bir işe yaradı, değil mi?</b>

10:43.240 --> 10:48.540
<b>En azından oğlumun ölümü insanlığın direnişi için faydalı oldu, değil mi?</b>

11:10.920 --> 11:14.680
<b>...hâlâ herhangi bir ilerleme kaydedemedik!</b>

11:18.110 --> 11:21.050
<b>Yetersizliğim yüzünden bir sürü askeri ölüme sürükledim!</b>

11:21.050 --> 11:27.300
<b>Devlerin kökeni ya da amaçlarına dair faydalı hiçbir şey öğrenemedik!</b>

11:44.740 --> 11:46.300
<b>Ne yaptığını sanıyorsun lanet velet?</b>

11:51.690 --> 11:53.980
<b>Ne yapıyorsun Mikasa?</b>

12:08.330 --> 12:13.210
<b>Surlarla ilgili olarak: İnsanoğlu üç katmandan oluşan surların ardında yaşamaktadır.</b>

13:11.890 --> 13:12.830
<b>İş için mi?</b>

13:20.600 --> 13:23.550
<b>Eren Keşif Birliğine katılmak istiyor.</b>

13:42.670 --> 13:45.320
<b>Neden dışarı çıkmak istiyorsun?</b>

13:51.230 --> 13:54.900
<b>Hiçbir şey bilmeden surların ardında ölmek istemiyorum!</b>

14:25.800 --> 14:30.780
<b>Döndüğüm zaman sana hep kapalı tuttuğum bodrum katını göstereceğim.</b>

14:52.930 --> 14:53.600
<b>Eren!</b>

15:10.810 --> 15:13.760
<b>Hatalı olduğumu göstermek istiyorsan neden bana vurmuyorsun?</b>

15:20.310 --> 15:26.250
<b>Bana vurmanın nedeni, haklı olduğumu bilmen ve aksini ispatlayamıyor olman değil mi?</b>

15:47.730 --> 15:49.950
<b>Eyvah. Kaçın lan! Mikasa da yanında!</b>

16:29.560 --> 16:35.140
<b>Bunun nedeni 100 yıldır bu surların ardında huzurlu bir yaşam sürüyor olmamız.</b>

17:19.410 --> 17:19.410
<b>100 yıldır yıkılmamış olsalar da bir gün yıkılmayacaklarının garantisi yok.</b>

18:33.830 --> 18:35.150
<b>Bu bir dev!</b>

19:32.230 --> 19:34.920
<b>Devler içeri girdiler!</b>

20:21.000 --> 20:22.150
<b>Anne!</b>

20:53.550 --> 20:57.330
<b>Eren, Mikasa'yı da alıp kaç! Çabuk ol!</b>

21:31.250 --> 21:33.500
<b>Çocukları alıp kaç buradan!</b>

22:21.190 --> 22:22.570
<b>Yaşamalısınız!</b>

23:39.020 --> 23:43.810
<b>O gün insanoğlu acı bir şekilde hatırlamıştı...</b>

25:34.710 --> 25:39.400
<b>Ancak Eren, o minicik kalbiyle intikam almaya yemin etti.</b>`;
