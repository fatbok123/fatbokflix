04:06.850 --> 04:08.880
<b>Sen misin Mikasa?</b>

04:09.920 --> 04:11.350
<b>Artık eve dönelim.</b>

04:12.720 --> 04:14.780
<b>Burada ne işin var?</b>

04:15.990 --> 04:18.570
<b>Hâlâ rüya gördüğünü sanacak kadar
derin mi uyuyordun?</b>

04:19.160 --> 04:24.540
<b>Hayır, bir türlü bitmek bilmeyen bir rüya
gördüğümü düşünüyordum.</b>

04:26.600 --> 04:30.350
<b>Nasıl bir rüyaydı ki? Hatırlayamıyorum.</b>

04:34.460 --> 04:36.670
<b>Eren, niye ağlıyorsun?</b>

04:37.070 --> 04:38.100
<b>Ne?</b>

04:42.070 --> 04:44.630
845 Yılı - Shiganshina Bölgesi

04:47.970 --> 04:52.350
<b>Dinleyin! Surlar Tanrı'nın bahşettiği
irfanla inşa edilmiştir.</b>

04:52.720 --> 04:55.560
<b>Surlar Tanrı'nın eseridir!</b>

04:56.180 --> 05:00.030
<b>Hiç kimse surların kutsallığına
dil uzatamaz!</b>

05:02.980 --> 05:07.390
<b>Ağladığımı hiç kimseye söyleme!</b>

05:07.390 --> 05:08.100
<b>Söylemem.</b>

05:09.270 --> 05:15.080
<b>Ama neden ağladığını bilmiyorsan
bunu babanla konuşman iyi olmaz mı?</b>

05:15.080 --> 05:16.700
<b>Aptallaşma!</b>

05:16.700 --> 05:18.810
<b>Babama bunu nasıl söyleyebilirim.</b>

05:18.810 --> 05:20.960
<b>Ne diye ağlıyormuşsun bakayım Eren?</b>

05:22.880 --> 05:24.120
<b>Hannes.</b>

05:24.650 --> 05:26.760
<b>Mikasa mı kızdı yoksa?</b>

05:27.120 --> 05:27.960
<b>Ne?</b>

05:27.960 --> 05:30.190
<b>Ne diye ben ağlayacakmışım ki?</b>

05:30.190 --> 05:31.550
<b>Leş gibi içki kokuyorsun!</b>

05:32.700 --> 05:34.240
<b>Bunda kötü bir şey yok ki.</b>

05:35.650 --> 05:37.340
<b>Yine mi içiyorsunuz?</b>

05:37.340 --> 05:39.210
<b>Sen de bize katılmak ister misin?</b>

05:39.210 --> 05:41.930
<b>Şey ama göreviniz yok mu?</b>

05:41.930 --> 05:43.980
<b>Evet, bugün kapıları gözetliyoruz.</b>

05:44.540 --> 05:49.880
<b>Sabahtan beri burada bekleyince
doğal olarak acıktık ve susadık.</b>

05:49.880 --> 05:55.330
<b>Birazcık alkollü bir şeyler içmemiz
o kadar da önemli bir şey değil.</b>

05:56.790 --> 05:59.170
<b>Bu halde gerektiğinde nasıl savaşacaksınız?</b>

05:59.630 --> 06:02.330
<b>Ne? Ne zaman savaşmamız gerekecek ki?</b>

06:02.330 --> 06:03.300
<b>Bir de soruyor musun?</b>

06:03.850 --> 06:06.760
<b>Elbette o şeyler surları delip
içeri girdikleri zaman!</b>

06:10.300 --> 06:11.970
<b>Bak bu can yakıcıydı.</b>

06:11.970 --> 06:15.540
<b>Eren, böyle şeyler yüksek sesle söylenmez.</b>

06:16.600 --> 06:19.020
<b>Epey de tez canlı değil mi
doktorun ufaklığı?</b>

06:19.580 --> 06:23.890
<b>Surları yıkacak olurlarsa
biz de üzerimize düşeni yaparız.</b>

06:23.890 --> 06:25.040
<b>Yine de...</b>

06:25.250 --> 06:28.290
<b>...bu surlar 100 yıldan beridir
hiç yıkılmadı.</b>

06:28.290 --> 06:33.830
<b>Ama babam en büyük tehlikenin insanların
böyle rehavete kapılması olduğunu söylemişti!</b>

06:33.830 --> 06:35.920
<b>Doktor öyle mi dedi?</b>

06:35.920 --> 06:37.320
<b>Gerçi haksız da değil.</b>

06:37.600 --> 06:41.670
<b>Doktor daha önce şehrimizi
vebadan kurtarmıştı.</b>

06:42.360 --> 06:44.880
<b>Ne yapsak ona borcumuzu ödeyemeyiz.</b>

06:44.880 --> 06:47.920
<b>Yine de devler tamamen farklı bir konu.</b>

06:49.220 --> 06:55.350
<b>Surları tamir ederken hep
etrafta dolaşan devleri görüyorum.</b>

06:55.830 --> 07:00.960
<b>Ama bir asker olarak konuşursam 50 metrelik
surlara bir şey yapabileceklerini sanmıyorum.</b>

07:00.960 --> 07:06.030
<b>O zaman en başından beri onlarla
savaşmak için hazırlıklı değil misiniz?</b>

07:06.030 --> 07:07.120
<b>Sanırım değiliz.</b>

07:08.130 --> 07:09.550
<b>Bu da ne demek?</b>

07:09.550 --> 07:11.950
<b>Öyleyse kendinize Şehir Muhafızları
demeyi bırakıp...</b>

07:11.950 --> 07:14.080
<b>...adınızı Sur Tamircileri olarak değiştirin.</b>

07:14.080 --> 07:15.700
<b>Bak bu kulağa fena gelmiyor.</b>

07:17.200 --> 07:22.710
<b>Yine de Eren, askerlerin savaşma vakti
geldiğinde felaket kapıya dayanmış demektir.</b>

07:23.130 --> 07:27.750
<b>Hiçbir şey yapmadan "işe yaramaz
beleşçiler" olarak anıldığımızda...</b>

07:27.750 --> 07:29.880
<b>...insanlar daha mutludur demektir.</b>

07:32.810 --> 07:39.640
<b>Evet, biliyorum. Dışarı çıkamasak da yemek
yiyip uyduğumuz müddetçe yaşayacağız.</b>

07:40.030 --> 07:42.490
<b>Ama böyle yaşayarak...</b>

07:43.960 --> 07:46.190
<b>...çiftlik hayvanlarından
ne farkımız kalır ki?</b>

07:49.330 --> 07:51.740
<b>Veledin ağzı iyi laf yapıyor.</b>

07:51.740 --> 07:55.040
<b>Sanki kendi elinden bir şey
gelirmiş gibi, değil mi Hannes?</b>

07:55.900 --> 07:57.040
<b>Evet.</b>

07:59.300 --> 08:00.420
<b>Eren!</b>

08:01.860 --> 08:03.540
<b>Ne tuhaf çocuk ama!</b>

08:04.410 --> 08:08.620
<b>Yoksa Keşif Birliğine katılmayı mı istiyor?</b>

08:17.800 --> 08:20.810
<b>Eren, Keşif Birliğine katılmaktan
vazgeçmen en iyisi.</b>

08:21.910 --> 08:25.500
<b>Ne? Sen de mi onlarla dalga geçmeye
başlayacaksın?</b>

08:25.500 --> 08:28.110
<b>Benim bahsettiğim o değil.</b>

08:34.880 --> 08:37.240
<b>Keşif Birliği geri döndü!</b>

08:37.240 --> 08:39.160
<b>Giriş kapısı açılıyor!</b>

08:39.160 --> 08:41.700
<b>Gidelim Mikasa!
Kahramanlar geri döndü!</b>

08:54.570 --> 08:56.560
<b>Kahretsin, göremiyorum.</b>

09:25.310 --> 09:28.370
<b>Geriye bu kadar azının geleceğini
kim düşünebilirdi.</b>

09:28.370 --> 09:30.970
<b>Geri kalanlar yenmiş olsa gerek.</b>

09:30.970 --> 09:34.480
<b>Surların dışına çıkarsan
başına gelecek olan budur işte.</b>

09:34.480 --> 09:36.820
<b>Moses! Moses!</b>

09:37.650 --> 09:41.420
<b>Şey, oğlum Moses'i göremiyorum.</b>

09:41.420 --> 09:43.420
<b>Oğlum nerede?</b>

09:44.830 --> 09:46.700
<b>Bu Moses'in annesi.</b>

09:47.220 --> 09:48.210
<b>Getir!</b>

10:14.130 --> 10:17.370
<b>Oğlunuzun kurtarabildiğimiz tek parçası bu.</b>

10:33.900 --> 10:37.900
<b>Ama oğlum bir işe yaradı, değil mi?</b>

10:39.900 --> 10:43.240
<b>Bir kahraman olmayabilir belki ama...</b>

10:43.240 --> 10:48.540
<b>...en azından oğlumun ölümü insanlığın
direnişi için faydalı oldu, değil mi?</b>

10:55.050 --> 10:56.090
<b>Elbette!</b>

11:00.220 --> 11:01.010
<b>Hayır...</b>

11:02.340 --> 11:05.880
<b>Bu görev sırasında biz...</b>

11:05.880 --> 11:08.120
<b>Hayır, bu defa da...</b>

11:10.920 --> 11:14.680
<b>...hâlâ herhangi bir ilerleme kaydedemedik!</b>

11:15.630 --> 11:18.110
<b>Yetersizliğim yüzünden...</b>

11:18.110 --> 11:21.050
<b>...bir sürü askeri ölüme sürükledim!</b>

11:21.050 --> 11:27.300
<b>Devlerin kökeni ya da amaçlarına dair
faydalı hiçbir şey öğrenemedik!</b>

11:33.560 --> 11:35.190
<b>Bu çok üzücüydü.</b>

11:35.190 --> 11:36.550
<b>Gerçekten de.</b>

11:37.070 --> 11:41.470
<b>Yani tüm yaptığımız insanlarımızı
yemek niyetine sunmak mı oldu şimdi?</b>

11:44.740 --> 11:46.300
<b>Ne yaptığını sanıyorsun lanet velet?</b>

11:49.720 --> 11:51.690
<b>Ne yapıyorsun Mikasa?</b>

11:51.690 --> 11:53.980
<b>Buraya gel lan velet!</b>

11:55.830 --> 11:58.360
<b>Mikasa! Yeter artık!</b>

12:03.850 --> 12:05.270
<b>Bunu niye yaptın şimdi?</b>

12:05.270 --> 12:07.010
<b>Odunların haline baksana!</b>

12:08.330 --> 12:13.210
<b>Eren, Keşif Birliğine katılmak konusundaki
fikrini değiştirdin mi?</b>

12:21.570 --> 12:23.890
<b>Yardım et de şunları toplayalım.</b>

12:25.210 --> 12:26.950
<b>Yardım edecek bir şey yok ki.</b>

12:44.200 --> 12:45.280
<b>Biz geldik.</b>

12:47.080 --> 12:48.400
<b>Hoş geldiniz.</b>

12:51.780 --> 12:53.050
<b>Bak sen.</b>

12:53.050 --> 12:55.250
<b>Bugün epey fazla çalışmışa benziyorsun.</b>

12:55.250 --> 12:56.660
<b>Evet.</b>

13:00.460 --> 13:01.850
<b>Ne var?</b>

13:01.850 --> 13:05.280
<b>Kulağın kızardı. Yalan söylüyorsun.</b>

13:05.280 --> 13:07.530
<b>Mikasa yardım etti, değil mi?</b>

13:08.760 --> 13:11.130
<b>Ne? Yolculuğa mı çıkıyorsun baba?</b>

13:11.890 --> 13:12.830
<b>İş için mi?</b>

13:12.830 --> 13:15.540
<b>Evet, iç surlarda birini görmem gerekiyor.</b>

13:15.540 --> 13:17.040
<b>İki üç güne dönmüş olurum.</b>

13:20.600 --> 13:23.550
<b>Eren Keşif Birliğine katılmak istiyor.</b>

13:28.100 --> 13:30.340
<b>Mikasa, sana bundan bahsetme demiştim!</b>

13:30.340 --> 13:33.480
<b>Eren, kafandan ne geçiyor?</b>

13:33.480 --> 13:37.710
<b>Surların dışında kaç kişinin
can verdiğini biliyor musun?</b>

13:37.710 --> 13:39.010
<b>Biliyorum tabii!</b>

13:39.010 --> 13:40.020
<b>O zaman neden...</b>

13:40.020 --> 13:40.730
<b>Eren.</b>

13:42.670 --> 13:45.320
<b>Neden dışarı çıkmak istiyorsun?</b>

13:46.890 --> 13:51.230
<b>Dış dünyanın nasıl bir yer olduğunu
öğrenmek istiyorum.</b>

13:51.230 --> 13:54.900
<b>Hiçbir şey bilmeden surların ardında
ölmek istemiyorum!</b>

13:55.530 --> 13:59.840
<b>Ayrıca hiç kimse bu görevi üstlenmezse...</b>

14:00.640 --> 14:03.340
<b>...şimdiye dek hayatını kaybeden bunca insan
boşuna ölmüş olacak!</b>

14:07.580 --> 14:08.800
<b>Anlıyorum.</b>

14:10.660 --> 14:12.050
<b>Gemim gelmek üzere.</b>

14:12.050 --> 14:13.460
<b>Artık gitmem gerek.</b>

14:13.460 --> 14:15.060
<b>Bekle bir dakika hayatım!</b>

14:15.060 --> 14:16.510
<b>Eren'i ikna etmeme yardım et!</b>

14:16.640 --> 14:22.780
<b>Carla, bir insanın merakını bastırabilecek
hiçbir şey yoktur.</b>

14:23.540 --> 14:24.280
<b>Eren.</b>

14:25.800 --> 14:30.780
<b>Döndüğüm zaman sana hep kapalı
tuttuğum bodrum katını göstereceğim.</b>

14:31.860 --> 14:32.840
<b>Gerçekten mi?</b>

14:36.900 --> 14:38.660
<b>İyi yolculuklar!</b>

14:40.950 --> 14:42.170
<b>Buna izin vermeyeceğim.</b>

14:43.550 --> 14:45.610
<b>Keşif Birliğine katılmak gibi
bir aptallık yapmayacaksın.</b>

14:45.610 --> 14:47.620
<b>Aptallık mı?</b>

14:47.620 --> 14:52.930
<b>Asıl aptal olanlar çiftlik hayvanları gibi
içeri tıkılıp yaşamak isteyenler!</b>

14:52.930 --> 14:53.600
<b>Eren!</b>

14:56.930 --> 15:00.720
<b>Mikasa, Eren çok düşüncesiz bir çocuk.</b>

15:01.230 --> 15:03.650
<b>Başınız derde girdiğinde birbirinize
yardım etmelisiniz.</b>

15:04.280 --> 15:04.960
<b>Peki.</b>

15:08.380 --> 15:09.820
<b>Ne oldu pis kafir?</b>

15:10.810 --> 15:13.760
<b>Hatalı olduğumu göstermek istiyorsan
neden bana vurmuyorsun?</b>

15:14.810 --> 15:16.720
<b>Neden yapacakmışım ki?</b>

15:16.720 --> 15:19.040
<b>O zaman seninle aynı seviyeye düşerim.</b>

15:19.040 --> 15:20.080
<b>Ne dedin sen?</b>

15:20.310 --> 15:26.250
<b>Bana vurmanın nedeni, haklı olduğumu bilmen
ve aksini ispatlayamıyor olman değil mi?</b>

15:27.100 --> 15:30.260
<b>Bu zaten hatalı olduğunu
kabul ettiğin anlamına gelmez mi?</b>

15:31.850 --> 15:34.230
<b>Kapat çeneni seni çokbilmiş pislik!</b>

15:34.230 --> 15:35.220
<b>Durun!</b>

15:37.220 --> 15:37.930
<b>Bu Eren.</b>

15:38.830 --> 15:40.710
<b>Ne kadar da aptal. Tekrar gelmiş.</b>

15:40.710 --> 15:42.010
<b>Daha fazlasını mı istiyorsun?</b>

15:42.010 --> 15:43.370
<b>Dersini vereceğiz!</b>

15:44.750 --> 15:46.530
<b>Mikasa da yanında!</b>

15:47.730 --> 15:49.950
<b>Eyvah. Kaçın lan!</b>

15:54.260 --> 15:58.170
<b>Bak, beni görünce nasıl da kaçtılar!</b>

15:58.170 --> 16:00.940
<b>Hayır, onlar Mikasa'yı görünce kaçtılar.</b>

16:02.390 --> 16:04.380
<b>İyi misin Armin?</b>

16:08.580 --> 16:10.240
<b>Kendim ayağa kalkabilirim.</b>

16:11.050 --> 16:12.150
<b>Anlıyorum.</b>

16:15.290 --> 16:20.300
<b>Sonra da eninde sonunda insanoğlunun dışarı
çıkması gerekeceğini söylediğimde...</b>

16:20.300 --> 16:22.620
<b>...bana vurdular ve kafir dediler.</b>

16:22.620 --> 16:23.650
<b>Kahretsin.</b>

16:25.640 --> 16:29.560
<b>Tek istediğimiz dışarı çıkmak.
Niye herkes bizden nefret ediyor ki?</b>

16:29.560 --> 16:35.140
<b>Bunun nedeni 100 yıldır bu surların ardında
huzurlu bir yaşam sürüyor olmamız.</b>

16:35.140 --> 16:40.040
<b>İnsanların dikkatsizce dışarı çıkması
devlerin içeri girmesine yol açabilir.</b>

16:40.040 --> 16:45.920
<b>O yüzden de krallık idaresi dış dünyaya
ilgi duyulmasını bile yasakladı.</b>

16:46.510 --> 16:49.670
<b>Tehlikeye atığımız kendi hayatlarımız.
Kimsenin buna karışmaya hakkı yok.</b>

16:49.670 --> 16:51.130
<b>Asla olmaz.</b>

16:53.340 --> 16:54.630
<b>Olmaz.</b>

16:54.630 --> 16:57.810
<b>Tabii ya! Bunu aileme söylemeye
nasıl cüret edersin?</b>

16:58.670 --> 17:00.540
<b>Bunu kabul ettiğimi hatırlamıyorum.</b>

17:00.540 --> 17:01.870
<b>Peki, nasıl gitti?</b>

17:02.430 --> 17:05.360
<b>Bundan pek mutlu olmadılar.</b>

17:07.040 --> 17:08.360
<b>Doğal olarak.</b>

17:12.810 --> 17:15.560
<b>Ben de bu surların ebediyen
bizi koruyacağına...</b>

17:15.560 --> 17:19.410
<b>...körü körüne inanan insanların
hatalı olduklarını düşünüyorum.</b>

17:19.590 --> 17:21.090
<b>Anne!</b>

17:23.160 --> 17:26.960
<b>100 yıldır yıkılmamış olsalar da...</b>

17:26.960 --> 17:32.510
<b>...bir gün yıkılmayacaklarının
hiçbir garantisi yok.</b>

17:51.820 --> 17:53.460
<b>O da neydi?</b>

17:53.460 --> 17:54.740
<b>Patlama mıydı?</b>

17:55.820 --> 17:56.580
<b>İşte orada!</b>

17:56.580 --> 17:57.860
<b>Bir şey mi düştü?</b>

17:57.860 --> 17:58.830
<b>Bilmiyorum.</b>

18:00.820 --> 18:01.990
<b>Bekle Armin!</b>

18:06.070 --> 18:07.510
<b>Ne oldu?</b>

18:07.510 --> 18:09.460
<b>Nereye bakıyorsun öyle?</b>

18:19.520 --> 18:24.960
<b>Mümkün değil. O sur 50 metre yüksekliğinde!</b>

18:26.520 --> 18:27.900
<b>Bu onlardan biri...</b>

18:33.830 --> 18:35.150
<b>Bu bir dev!</b>

19:20.860 --> 19:25.830
<b>Surda delik açıldı.</b>

19:30.770 --> 19:32.230
<b>İçeri girdiler!</b>

19:32.230 --> 19:34.920
<b>Devler içeri girdiler!</b>

19:38.110 --> 19:39.090
<b>Bizim de...</b>

19:40.150 --> 19:40.840
<b>Eren!</b>

19:41.160 --> 19:43.470
<b>Evim o tarafta.</b>

19:43.470 --> 19:44.350
<b>Annem...</b>

19:45.640 --> 19:46.600
<b>Mikasa!</b>

19:52.670 --> 19:54.480
<b>Her şey bitti.</b>

19:55.150 --> 20:01.450
<b>Bu şehrin işi bitti,
devler her yeri yakıp yıkacak!</b>

20:07.260 --> 20:09.080
<b><i>Evime bir şey olmuş olamaz!</i></b>

20:09.080 --> 20:12.670
<b>Şu köşeyi döndüğümde evim
her zamanki gibi karşımda olacak!</b>

20:17.280 --> 20:18.490
<b>Anne!</b>

20:21.000 --> 20:22.150
<b>Anne!</b>

20:24.090 --> 20:24.800
<b>Eren.</b>

20:24.800 --> 20:28.080
<b>Mikasa, o taraftan tut.
Şu direği kaldırmamız gerek.</b>

20:47.060 --> 20:49.290
<b>- Acele et Mikasa!
- Biliyorum!</b>

20:50.220 --> 20:52.820
<b>Devler içeri giriyor!</b>

20:53.550 --> 20:57.330
<b>Eren, Mikasa'yı da alıp kaç!
Çabuk ol!</b>

20:57.330 --> 21:00.970
<b>Ben de kaçmak istiyorum!
Sen de acele et de çık oradan!</b>

21:01.710 --> 21:04.850
<b>Bacağım yıkıntıların altında ezildi.</b>

21:05.650 --> 21:08.310
<b>Buradan çıksam bile koşamam.</b>

21:09.160 --> 21:10.310
<b>Anlıyorsun, değil mi?</b>

21:10.310 --> 21:12.280
<b>Ben seni taşırsam kaçabiliriz!</b>

21:12.280 --> 21:14.600
<b>Niye bir kere olsun dediğimi dinlemiyorsun?</b>

21:15.430 --> 21:17.650
<b>Son bir defa sözümü dinle!</b>

21:18.180 --> 21:19.440
<b>Mikasa!</b>

21:20.460 --> 21:23.320
<b>Hayır. Hayır!</b>

21:23.950 --> 21:25.990
<b>Bu gidişle üçümüz de...</b>

21:27.980 --> 21:29.090
<b>Hannes!</b>

21:31.250 --> 21:33.500
<b>Çocukları alıp kaç buradan!</b>

21:34.680 --> 21:37.440
<b>Beni küçümseme Carla.</b>

21:37.440 --> 21:41.840
<b>Devi öldürüp üçünüzü de kurtaracağım.</b>

21:42.030 --> 21:44.430
<b>Bekle! Sen onunla savaşamazsın!</b>

21:45.450 --> 21:48.040
<b>Haklı. Kesinlikle ikisini kurtarabilirim.</b>

21:48.040 --> 21:51.810
<b>Ama şimdi borcumu ödemek için
bir fırsatım var!</b>

22:08.490 --> 22:12.200
<b>Dursana Hannes!
Ne yapıyorsun?</b>

22:13.270 --> 22:14.400
<b>Teşekkürler.</b>

22:15.300 --> 22:17.460
<b>Annem hâlâ orada!</b>

22:18.210 --> 22:20.380
<b>Eren! Mikasa!</b>

22:21.190 --> 22:22.570
<b>Yaşamalısınız!</b>

22:36.030 --> 22:37.890
<b>Gitmeyin.</b>

22:48.300 --> 22:51.870
<b>Yapma!</b>

23:25.400 --> 23:29.010
<b>O gün insanoğlu acı bir şekilde hatırlamıştı.</b>

23:33.860 --> 23:36.700
<b>Devlerin boyunduruğu altında
duyduğumuz korkuyla...</b>

23:39.020 --> 23:43.810
<b>...adına Surlar denilen kuş kafeslerinde
sürdüğümüz o pespaye hayatı.</b>

25:26.720 --> 25:28.540
<b>Shiganshina düşmüştü.</b>

25:29.360 --> 25:33.860
<b>İnsanoğlunun yapabileceği tek şey
dua etmek, çığlık atmak ve ölmekti.</b>

25:34.710 --> 25:39.400
<b>Ancak Eren, o minicik kalbiyle
intikam almaya yemin etti.</b>

            document.getElementById('current-desc').innerText = ep.desc;
            
            player.src({ type: 'application/x-mpegURL', src: ep.m3u8 });
            
            player.ready(function() {
                const oldTracks = player.remoteTextTracks();
                for (let i = 0; i < oldTracks.length; i++) {
                    player.removeRemoteTextTrack(oldTracks[i]);
                }

                if(ep.vtt) {
                    const track = player.addRemoteTextTrack({
                        kind: 'subtitles',
                        src: ep.vtt,
                        srclang: 'tr',
                        label: 'Türkçe',
                        default: true
                    }, false);

                    track.on('load', function() {
                        this.mode = 'showing';
                    });
                }
            });

            document.querySelectorAll('.ep-card').forEach((card, i) => {
                card.classList.toggle('active', i === index);
            });
            
            player.play();
        }

        episodes.forEach((ep, index) => {
            const card = document.createElement('div');
            card.className = `ep-card ${index === 0 ? 'active' : ''}`;
            card.innerHTML = `
                <div class="ep-num">${ep.id < 10 ? '0'+ep.id : ep.id}</div>
                <div class="ep-name">${ep.title}</div>
            `;
            card.onclick = () => loadEpisode(index);
            epListContainer.appendChild(card);
        });

        loadEpisode(0);
    </script>
</body>
</html>
